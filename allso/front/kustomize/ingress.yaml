apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  namespace: monitor
  annotations:
    nginx.org/websocket-services: "frontend"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  tls:
  - hosts:
    - allso.juxtagene.com
    secretName: allso-juxtagene-com-tls
  rules:
  - host: allso.juxtagene.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80

